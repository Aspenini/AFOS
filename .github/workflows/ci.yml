name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-uefi,aarch64-unknown-uefi,wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask check

  desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p afos-desktop

  uefi-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-uefi,aarch64-unknown-uefi
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y mtools ovmf qemu-system-arm qemu-system-x86 qemu-efi-aarch64
      - run: cargo xtask smoke x86_64
        env:
          AFOS_UEFI_X86_CODE: /usr/share/OVMF/OVMF_CODE.fd
          AFOS_UEFI_X86_VARS: /usr/share/OVMF/OVMF_VARS.fd
      - run: cargo xtask smoke aarch64
        env:
          AFOS_UEFI_AARCH64_CODE: /usr/share/AAVMF/AAVMF_CODE.fd
          AFOS_UEFI_AARCH64_VARS: /usr/share/AAVMF/AAVMF_VARS.fd

