[alias]
xtask = "run -p xtask --"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-Tplatforms/bare-metal/linker-x86_64.ld",
]

[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=-Tplatforms/bare-metal/linker-aarch64.ld",
]
